services:
  mcc:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: mcc-iotedge
    restart: on-failure
    # Required: IoT Edge daemons need elevated capabilities
    privileged: true
    environment:
      # Required: from the Azure portal under your MCC cache node registration
      - CUSTOMER_ID=${CUSTOMER_ID}
      - CACHE_NODE_ID=${CACHE_NODE_ID}
      - CUSTOMER_KEY=${CUSTOMER_KEY}
      # One-time key from the Azure portal command line — expires after use
      - REGISTRATION_KEY=${REGISTRATION_KEY}
    volumes:
      # Share the host Docker socket so IoT Edge can pull and run the MCC
      # container as a sibling on the same Docker daemon
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist IoT Edge identity and certificate state across restarts
      - iotedge-data:/var/lib/aziot
      # Persist IoT Edge runtime state (edgeAgent, edgeHub)
      - iotedge-run:/run/iotedge

volumes:
  iotedge-data:
    driver: local
  iotedge-run:
    driver: local
